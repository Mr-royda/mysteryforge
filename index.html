<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MysteryForge — Générateur de Murder Mystery</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#0e0b08;
  color:#eee;
  margin:0;
  padding:0;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

h1 {
  color:#c9a84c;
}

button {
  padding:10px 20px;
  background:#c42b2b;
  color:white;
  border:none;
  cursor:pointer;
  margin-top:10px;
}

button:hover {
  background:#8b1c1c;
}

.suspects-container {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.suspect-card {
  background:#1a1a1a;
  padding:10px;
  border-left:4px solid #3498db;
}

.section-box {
  margin-top:20px;
  padding:10px;
  background:#181310;
}

.indices-grid {
  margin-top:10px;
}

.index-item {
  background:#111;
  padding:10px;
  margin-bottom:5px;
}

.reveal-box {
  margin-top:20px;
  padding:15px;
  background:#2a1a1a;
  border:1px solid #c42b2b;
}
</style>
</head>

<body>

<div class="container">

<h1>MysteryForge</h1>

<label>Nombre de joueurs</label>
<input type="range" id="nb-joueurs" min="4" max="10" value="6">
<span id="nb-val">6</span>

<br><br>

<button onclick="generateScenario()">🎮 Générer scénario</button>

<div id="output-placeholder" style="margin-top:20px;">Prêt à générer un mystère...</div>
<div id="output-result"></div>

</div>

<script>

// ---------------- DATA ----------------
function getData() {
  return {
    names: ["Arthur", "Claire", "Julien", "Sophie", "Marc", "Léa", "Nicolas", "Emma"],
    roles: ["médecin", "avocat", "héritier", "majordome", "artiste", "inspecteur"],
    traits: ["charismatique", "froid", "instable", "calculateur", "mystérieux"],
    secrets: [
      "dettes énormes",
      "relation interdite",
      "double vie",
      "chantage",
      "identité falsifiée"
    ],
    alibis: [
      "était seul dans sa chambre",
      "parlait avec un invité",
      "marchait dans le jardin",
      "était au téléphone"
    ],
    murders: [
      { lieu:"le salon", description:"empoisonnement au vin", indice:"verre brisé" },
      { lieu:"la bibliothèque", description:"étouffement", indice:"livre déplacé" },
      { lieu:"le jardin", description:"coup violent", indice:"terre retournée" }
    ],
    motives: [
      "héritage",
      "vengeance",
      "jalousie",
      "chantage financier"
    ],
    settings: [
      "manoir isolé",
      "villa de luxe",
      "château ancien"
    ],
    twists: [
      "la victime était encore vivante après la découverte",
      "deux personnes ont agi ensemble",
      "le meurtre a été mis en scène"
    ],
    titles: [
      "Le Dernier Testament",
      "Silence au Manoir",
      "Mort sous la Lune"
    ]
  };
}

// ---------------- HELPERS ----------------
function random(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

// ---------------- ENGINE ----------------
function generateScenario() {

  const result = document.getElementById("output-result");
  const placeholder = document.getElementById("output-placeholder");
  if (placeholder) placeholder.style.display = "none";

  const nb = parseInt(document.getElementById("nb-joueurs").value);
  const data = getData();

  const setting = random(data.settings);
  const hour = random(["22h00","23h30","01h15","03h00"]);

  // PERSONNAGES
  let names = shuffle([...data.names]);

  let characters = [];

  for (let i = 0; i < nb; i++) {
    characters.push({
      nom: names[i],
      role: random(data.roles),
      trait: random(data.traits),
      secret: random(data.secrets),
      alibi: random(data.alibis),
      suspicion: 0
    });
  }

  const victime = random(characters);
  const suspects = characters.filter(p => p !== victime);

  const coupable = suspects[Math.floor(Math.random() * suspects.length)];
  const faux = random(suspects.filter(p => p !== coupable));

  const crime = random(data.murders);
  const motive = random(data.motives);

  // INDICES
  const clues = [
    { type:"Physique", desc:`Trace de ${crime.indice} dans ${crime.lieu}`, target:coupable.nom },
    { type:"Temps", desc:`${coupable.nom} sans alibi clair à ${hour}`, target:coupable.nom },
    { type:"Objet", desc:`Objet appartenant à ${coupable.nom}`, target:coupable.nom },
    { type:"Fausse piste", desc:`Preuve manipulée contre ${faux.nom}`, target:faux.nom },
    { type:"Mobile", desc:`Victime menaçait sur ${motive}`, target:coupable.nom }
  ];

  // SUSPICION
  clues.forEach(c => {
    const p = characters.find(x => x.nom === c.target);
    if (p) p.suspicion += 2;
  });

  const final = [...characters].sort((a,b)=>b.suspicion-a.suspicion)[0];

  // RENDER
  result.innerHTML = `
    <h2>${random(data.titles)}</h2>

    <div class="section-box">
      <p><strong>Victime :</strong> ${victime.nom}</p>
      <p>Lieu : ${crime.lieu}</p>
      <p>Cause : ${crime.description}</p>
      <p>Heure estimée : ${hour}</p>
    </div>

    <h3>Suspects</h3>
    <div class="suspects-container">
      ${characters.map(p => `
        <div class="suspect-card">
          <strong>${p.nom}</strong>
          <p>${p.role}</p>
          <p>${p.trait}</p>
          <p>Secret: ${p.secret}</p>
          <p>Alibi: ${p.alibi}</p>
          <p>Suspicion: ${p.suspicion}</p>
        </div>
      `).join('')}
    </div>

    <h3>Indices</h3>
    <div class="indices-grid">
      ${clues.map(c => `
        <div class="index-item">
          <strong>${c.type}</strong> - ${c.desc}
        </div>
      `).join('')}
    </div>

    <div class="reveal-box">
      <h3>Solution</h3>
      <p><strong>Coupable :</strong> ${final.nom}</p>
      <p><strong>Mobile :</strong> ${motive}</p>
      <p><strong>Twist :</strong> ${random(data.twists)}</p>
    </div>
  `;

  result.style.display = "block";
}

// UI
document.getElementById("nb-joueurs").addEventListener("input", e=>{
  document.getElementById("nb-val").textContent = e.target.value;
});

</script>

</body>
</html>
