<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MysteryForge — Générateur de Scénarios</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --noir: #0a0a0a;
            --parchemin: #f4ece1;
            --or: #c9a84c;
            --or-pale: #e2c98a;
            --bordure: rgba(201, 168, 76, 0.2);
            --texte: #d1d1d1;
            --texte-muted: #888;
            --rouge: #8b1c1c;
            --font-serif: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        body {
            background-color: var(--noir);
            color: var(--texte);
            font-family: var(--font-body);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            padding: 4rem 0;
            border-bottom: 1px solid var(--bordure);
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            color: var(--parchemin);
        }

        .logo span { color: var(--or); }

        /* Configuration Slider */
        .config-panel {
            background: rgba(255,255,255,0.02);
            padding: 2rem;
            border: 1px solid var(--bordure);
            margin: 2rem 0;
            text-align: center;
        }

        input[type="range"] { width: 100%; accent-color: var(--or); }

        button#btn-generate {
            background: var(--or);
            color: var(--noir);
            border: none;
            padding: 1rem 2rem;
            font-weight: bold;
            cursor: pointer;
            font-family: var(--font-body);
            text-transform: uppercase;
            transition: 0.3s;
        }

        button#btn-generate:hover { background: var(--or-pale); }

        /* Scénario Output Styles */
        .scenario-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .scenario-title {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            color: var(--or);
            margin-bottom: 0.5rem;
        }

        .section-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--bordure);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .suspects-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .suspect-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--bordure);
            padding: 1.25rem;
            transition: 0.3s;
        }

        .suspect-card:hover { border-color: var(--or); }

        .tag {
            font-size: 0.7rem;
            color: var(--or);
            border: 1px solid var(--or);
            padding: 2px 6px;
            text-transform: uppercase;
        }

        .indices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .index-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--bordure);
            padding: 1rem;
        }

        .index-type { color: var(--or); font-size: 0.8rem; font-weight: bold; }

        .revelation-box {
            background: rgba(139, 28, 28, 0.1);
            border: 1px solid var(--rouge);
            padding: 2rem;
            margin-top: 3rem;
        }

        .revelation-warning { color: var(--rouge); font-weight: bold; letter-spacing: 2px; text-align: center; margin-bottom: 1rem; }

        .output-actions { display: flex; gap: 1rem; margin-top: 2rem; justify-content: center; }

        .btn-action {
            background: transparent;
            border: 1px solid var(--bordure);
            color: var(--parchemin);
            padding: 0.8rem 1.5rem;
            cursor: pointer;
        }

        #output-loading { display: none; text-align: center; padding: 2rem; color: var(--or); }
        
        footer { text-align: center; padding: 4rem 0; color: var(--texte-muted); font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">Mystery<span>Forge</span></div>
        <p>Forgez des enquêtes criminelles uniques en un clic.</p>
    </header>

    <div class="config-panel">
        <label>Nombre de suspects : <span id="nb-joueurs-val">6</span></label><br><br>
        <input type="range" id="nb-joueurs" min="4" max="12" value="6"><br><br>
        <button id="btn-generate" onclick="generateScenario()">⚡ Forger le mystère</button>
    </div>

    <div id="output-loading">⏳ Analyse des preuves en cours...</div>
    <div id="output-placeholder" style="text-align: center; color: var(--texte-muted);">
        Réglez le nombre de joueurs et lancez la forge pour générer votre scénario.
    </div>

    <div id="output-result"></div>

    <footer>
        <p>© 2026 MysteryForge · Tous droits réservés · contact@mysteryforge.fr</p>
    </footer>
</div>

<script>
const nbJoueurs = document.getElementById('nb-joueurs');
const nbJoueursVal = document.getElementById('nb-joueurs-val');
nbJoueurs.addEventListener('input', () => { nbJoueursVal.textContent = nbJoueurs.value; });

function getData() {
    return {
        titles: ['Les Cendres du Manoir Grimaldi', 'Minuit sur le Transcontinental', 'La Valse des Masques Brisés', 'Le Testament des Ombres', 'L\'Affaire du Salon Pourpre'],
        settings: [{nom: 'un manoir en Bretagne'}, {nom: 'un palace dans les Alpes'}, {nom: 'un train de luxe'}, {nom: 'une villa Art déco'}],
        names: ['Camille Delaunay', 'Victor Marceau', 'Éléonore Vasseur', 'Jules Mercier', 'Ariane Bellamy', 'Noah Delcourt', 'Inès Rochefort', 'Bastien Morin', 'Salomé Vernier', 'Raphaël Dargent', 'Nora Salvi', 'Théo Lavigne'],
        roles: ['Avocat', 'Journaliste', 'Médecin', 'Héritier', 'Actrice', 'Chef privé', 'Banquier', 'Historienne'],
        traits: ['charismatique mais nerveux', 'glacial et méthodique', 'souriant, trop confiant', 'réservée, observatrice'],
        secrets: ['a falsifié un diplôme', 'détourne de l’argent', 'cache une condamnation ancienne', 'est lourdement endetté'],
        alibis: ['était en appel vidéo', 'dormait dans sa suite', 'discutait en cuisine', 'lisait à la bibliothèque'],
        motives: ['un chantage financier', 'un scandale familial', 'une vengeance professionnelle', 'une ruine imminente'],
        murders: [
            { description: 'empoisonnement', indice: 'poudre rare', lieu: 'la cave à vin' },
            { description: 'traumatisme crânien', indice: 'éclats de cristal', lieu: 'le hall' },
            { description: 'asphyxie', indice: 'fibres de velours', lieu: 'le salon' }
        ]
    };
}

function generateScenario() {
    const btn = document.getElementById('btn-generate');
    const result = document.getElementById('output-result');
    const loading = document.getElementById('output-loading');
    const placeholder = document.getElementById('output-placeholder');

    btn.disabled = true;
    placeholder.style.display = 'none';
    result.style.display = 'none';
    loading.style.display = 'block';

    setTimeout(() => {
        const nb = parseInt(nbJoueurs.value);
        const data = getData();
        const usedNames = shuffle([...data.names]).slice(0, nb);
        
        const personnages = usedNames.map(name => ({
            nom: name,
            role: random(data.roles),
            trait: random(data.traits),
            secret: random(data.secrets),
            alibi: random(data.alibis),
            suspicion: 0
        }));

        const victime = random(personnages);
        const suspects = personnages.filter(p => p !== victime);
        const coupable = random(suspects);
        const fauxCoupable = random(suspects.filter(s => s !== coupable));
        
        coupable.suspicion = 5;
        fauxCoupable.suspicion = 3;

        const meurtre = random(data.murders);
        const mobile = random(data.motives);

        result.innerHTML = `
            <div class="scenario-header">
                <div class="scenario-title">"${random(data.titles)}"</div>
                <div class="scenario-lieu">📍 Lieu : ${random(data.settings).nom}</div>
            </div>

            <div class="section-box">
                <h3>📁 Rapport de Scène de Crime</h3>
                <p>Le corps de <strong>${victime.nom}</strong> (${victime.role}) a été découvert dans <strong>${meurtre.lieu}</strong>. Cause : ${meurtre.description}.</p>
            </div>

            <h3>👥 Dossier des Suspects</h3>
            <div class="suspects-container">
                ${suspects.map(p => `
                    <div class="suspect-card" style="border-left: 5px solid ${p.suspicion >= 5 ? '#e74c3c' : (p.suspicion >= 3 ? '#f1c40f' : '#3498db')}">
                        <div class="suspect-header"><strong>${p.nom}</strong> <span class="tag">${p.role}</span></div>
                        <p>🎭 <em>${p.trait}</em></p>
                        <p>🕒 Alibi : ${p.alibi}</p>
                        <p>🤫 Secret : ${p.secret}</p>
                    </div>
                `).join('')}
            </div>

            <h3>🔍 Indices</h3>
            <div class="indices-grid">
                <div class="index-item"><span class="index-type">Physique</span><p>Trace de ${meurtre.indice} à proximité.</p></div>
                <div class="index-item"><span class="index-type">Mobile</span><p>Lien avec ${mobile} détecté chez ${coupable.nom}.</p></div>
                <div class="index-item"><span class="index-type">Témoignage</span><p>L'alibi de ${coupable.nom} semble incohérent.</p></div>
            </div>

            <div class="revelation-box">
                <div class="revelation-warning">⚠ RÉVÉLATION (MAÎTRE DE JEU) ⚠</div>
                <p>Coupable : <strong>${coupable.nom}</strong></p>
                <p>Mobile : ${mobile} | Arme : ${meurtre.description}</p>
            </div>
        `;

        loading.style.display = 'none';
        result.style.display = 'block';
        btn.disabled = false;
    }, 800);
}

function random(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(array) { return [...array].sort(() => Math.random() - 0.5); }
</script>

</body>
</html>
