<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur - MysteryForge</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="app-body">
    <nav>
        <div class="logo">MysteryForge</div>
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="generator.html">Générateur</a></li>
            <li><a href="pricing.html">Tarifs</a></li>
        </ul>
    </nav>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>⚙️ Paramètres</h3>
            </div>
            
            <div class="settings-group">
                <label for="players">Nombre de joueurs : <span id="player-val">6</span></label>
                <input type="range" id="players" min="4" max="12" value="6" oninput="document.getElementById('player-val').innerText = this.value">
            </div>

            <div class="settings-group">
                <label for="universe">Univers & Époque</label>
                <select id="universe">
                    <option value="Orient Express — Hiver 1934">Orient Express — Hiver 1934</option>
                    <option value="Manoir Anglais — Années 20">Manoir Anglais — Années 20</option>
                    <option value="Station Spatiale — 2150">Station Spatiale — 2150</option>
                    <option value="Auberge Médiévale — 1450">Auberge Médiévale — 1450</option>
                </select>
            </div>

            <div class="settings-group">
                <label for="difficulty">Difficulté</label>
                <select id="difficulty">
                    <option value="Facile — Indices évidents">Facile — Indices évidents</option>
                    <option value="Intermédiaire — Quelques pièges">Intermédiaire — Quelques pièges</option>
                    <option value="Difficile — Enquête complexe">Difficile — Enquête complexe</option>
                </select>
            </div>

            <div class="settings-group">
                <label for="duration">Durée de jeu</label>
                <select id="duration">
                    <option value="1h — Format court">1h — Format court</option>
                    <option value="3h — Format standard">3h — Format standard</option>
                    <option value="Soirée complète">Soirée complète</option>
                </select>
            </div>

            <div class="settings-group">
                <label for="tone">Ton de la soirée</label>
                <select id="tone">
                    <option value="Élégant & Romantique">Élégant & Romantique</option>
                    <option value="Sombre & Angoissant">Sombre & Angoissant</option>
                    <option value="Humoristique & Décalé">Humoristique & Décalé</option>
                </select>
            </div>

            <button id="generate-btn" class="btn-generate">
                <span>✨ Forger le mystère</span>
            </button>
        </aside>

        <main class="main-content">
            <div id="output-header">
                <span class="status-badge">Prêt à générer</span>
            </div>
            
            <div id="scenario-result" class="scenario-paper">
                <div class="placeholder-text">
                    <img src="https://img.icons8.com/ios/100/6366f1/search--v1.png" alt="Loupe" style="opacity: 0.2;">
                    <p>Configurez vos paramètres à gauche et cliquez sur le bouton pour créer votre intrigue.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/generator.js"></script>
</body>
</html>
